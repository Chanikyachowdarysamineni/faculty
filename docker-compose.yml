version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0-alpine
    container_name: wlm-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: wlm
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    networks:
      - wlm-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # WLM API Server
  wlm-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wlm-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/wlm?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-this-in-production-min-64-chars-required-now}
      JWT_EXPIRES_IN: 8h
      MAX_FAILED_LOGIN_ATTEMPTS: 5
      ACCOUNT_LOCK_MINUTES: 15
      AUTH_LOGIN_RATE_LIMIT: 10
      CLIENT_ORIGIN: http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000
      RESET_TOKEN_TTL_MINUTES: 30
      LOG_LEVEL: info
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - wlm-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: MongoDB Express (Database UI) - for development only
  mongo-express:
    image: mongo-express:latest
    container_name: wlm-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
    networks:
      - wlm-network
    profiles:
      - debug

volumes:
  mongodb-data:
    driver: local
  mongodb-config:
    driver: local

networks:
  wlm-network:
    driver: bridge

# Usage:
# - Development with MongoDB UI:
#   docker-compose --profile debug up -d
#
# - Production (without UI):
#   docker-compose up -d
#
# - View logs:
#   docker-compose logs -f wlm-server
#
# - Stop all services:
#   docker-compose down -v
