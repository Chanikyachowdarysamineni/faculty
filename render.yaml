services:
  # ── Backend API ──────────────────────────────────
  - type: web
    name: wlm-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://wlm-client.onrender.com,https://faculty-workload-management.onrender.com,https://faculty-workload-management-cse-client.onrender.com,https://faculty-workload-management-1.onrender.com
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: AUTH_LOGIN_RATE_LIMIT
        value: "10"
      - key: MAX_FAILED_LOGIN_ATTEMPTS
        value: "5"
      - key: ACCOUNT_LOCK_MINUTES
        value: "15"
      - key: RESET_TOKEN_TTL_MINUTES
        value: "30"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  # ── Frontend React App ───────────────────────────
  - type: web
    name: wlm-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://wlm-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
