services:
  # ── Backend API ──────────────────────────────────
  - type: web
    name: wlm-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://wlm-client.onrender.com,https://faculty-workload-management.onrender.com,https://faculty-workload-management-cse-client.onrender.com,https://faculty-workload-management-1.onrender.com
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        value: eYkL9pQ2mR5nW8xC3vB6hJ0fG4sT1aU9eD3zY6jQ2wL5rK8oP1mN4xV7cB0fH3gJ6lM9kP2qR5sT8uV1wX4yZ7aB0cD3eF6gH9jK2mL5nO8pQ1rS4tU7vW0xY3zB6cD9
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: BCRYPT_ROUNDS
        value: "10"
      - key: DB_MAX_POOL
        value: "20"
      - key: DB_MIN_POOL
        value: "5"
      - key: AUTH_LOGIN_RATE_LIMIT
        value: "10"
      - key: MAX_FAILED_LOGIN_ATTEMPTS
        value: "5"
      - key: ACCOUNT_LOCK_MINUTES
        value: "15"
      - key: RESET_TOKEN_TTL_MINUTES
        value: "30"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: ADMIN_ID
        value: admin
      - key: ADMIN_PASSWORDRE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: ADMIN_ID
        value: admin
      - key: ADMIN_PASSWORD
        sync: false

  # ── Frontend React App ───────────────────────────
  - type: web
    name: wlm-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://wlm-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
