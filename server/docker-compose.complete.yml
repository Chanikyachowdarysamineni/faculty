# Complete Production Stack with Nginx Reverse Proxy
# Usage: docker-compose -f docker-compose.complete.yml up -d
# This includes backend + nginx proxy + optional database

version: '3.9'

services:
  # WLM Backend API
  wlm-server:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: wlm-backend
    
    # Load production environment
    env_file:
      - .env.production
    
    # Only expose to internal network (nginx will handle external access)
    expose:
      - "5000"
    
    # Health check
    healthcheck:
      test: ["GET", "/deva/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Restart policy
    restart: unless-stopped
    
    # Resource limits
    resources:
      limits:
        cpus: '2'
        memory: 1G
      reservations:
        cpus: '1'
        memory: 512M
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    networks:
      - wlm-network
    
    depends_on:
      - mongodb
    
    labels:
      app: "wlm-backend"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    
    container_name: wlm-nginx
    
    # Expose HTTP/HTTPS
    ports:
      - "80:80"
      - "443:443"
    
    # Mount nginx config
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # For SSL certificates (optional)
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    
    # Restart policy
    restart: unless-stopped
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"
    
    networks:
      - wlm-network
    
    depends_on:
      - wlm-server
    
    labels:
      app: "wlm-nginx"

  # MongoDB (Optional - if not using external MongoDB Atlas)
  # To use external MongoDB, remove this service and set MONGO_URI in .env.production
  mongodb:
    image: mongo:7-alpine
    
    container_name: wlm-mongodb
    
    # Mount data volume
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: wlm
    
    # Only expose to internal network
    expose:
      - "27017"
    
    # Health check
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 5
    
    # Restart policy
    restart: unless-stopped
    
    networks:
      - wlm-network
    
    labels:
      app: "wlm-mongodb"

# Volumes for MongoDB data persistence
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

# Network for inter-service communication
networks:
  wlm-network:
    driver: bridge
